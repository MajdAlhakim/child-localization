services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: localization
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: changeme
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d localization" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://admin:changeme@db:5432/localization
      SECRET_KEY: dev-secret-key-change-in-production
      GATEWAY_API_KEY: dev-gateway-key-change-in-production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app

volumes:
  postgres_data:
