# nginx/nginx.conf
# Handles TLS termination on port 443, proxies to FastAPI backend on port 8000
# WebSocket upgrade headers included for /ws/ routes

server {
    listen 80;
    server_name 35.238.189.188;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name 35.238.189.188;

    # TLS certificates — generated by Certbot
    ssl_certificate     /etc/letsencrypt/live/35.238.189.188/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/35.238.189.188/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000" always;

    # REST API and gateway endpoints
    location / {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSocket endpoint — requires upgrade headers
    location /ws/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 3600s;  # Keep WS connections alive for 1 hour
    }
}
