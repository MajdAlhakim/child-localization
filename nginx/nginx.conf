# nginx/nginx.conf
# Handles TLS termination on port 443, proxies to FastAPI backend on port 8000
# WebSocket upgrade headers included for /ws/ routes

server {
    listen 80;
    server_name trakn.duckdns.org;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name trakn.duckdns.org;

    # TLS certificates — generated by Certbot
    ssl_certificate     /etc/letsencrypt/live/trakn.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trakn.duckdns.org/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000" always;

    # REST API and gateway endpoints
    # HTTP/1.1 + keep-alive so ESP32 http.setReuse(true) works end-to-end
    keepalive_timeout 120s;   # > firmware 2s timeout + 11s scan gap + margin

    # Web Mapping Tool — served as same-origin so no CORS preflight
    location /tool {
        alias /usr/share/nginx/html/tool;
        index index.html;
        try_files $uri /usr/share/nginx/html/tool/index.html;
    }

    location / {
        proxy_pass             http://backend:8000;
        proxy_http_version     1.1;
        proxy_set_header       Connection        "";   # clear hop-by-hop for keep-alive
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_read_timeout     30s;   # firmware timeout is 2s; 30s is safe headroom
        proxy_connect_timeout  10s;
    }

    # WebSocket endpoint — requires upgrade headers
    location /ws/ {
        proxy_pass         http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_read_timeout 3600s;  # Keep WS connections alive for 1 hour
    }
}