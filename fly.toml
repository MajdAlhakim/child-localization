app = "child-localization-api"
primary_region = "sin"          # Singapore — closest to Qatar University

[build]
  dockerfile = "backend/Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = false   # ALWAYS-ON — do not spin down
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    grace_period = "10s"
    interval     = "30s"
    method       = "GET"
    path         = "/api/v1/health"
    port         = 8080
    timeout      = "5s"
    type         = "http"
